<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatador SAFA — Língua Portuguesa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Formatador SAFA</h1>
            <nav class="tab-bar">
                <button class="tab-link active" onclick="openTab(event, 'tab-formulador')">Formulador de Prompt</button>
                <button class="tab-link" onclick="openTab(event, 'tab-formatador')">Formatador de Item</button>
                <button class="tab-link" onclick="openTab(event, 'tab-safa')">Padrão SAFA</button>
                <button class="tab-link" onclick="openTab(event, 'tab-imagens')">Montagem das Imagens</button>
            </nav>
        </header>

        <main>
            <!-- ABA 1: FORMULADOR DE PROMPT -->
            <section id="tab-formulador" class="tab-content active">
                <div class="grid-form">
                    <div class="form-group">
                        <label>Matriz-base:</label>
                        <select id="f-matriz"></select>
                    </div>
                    <div class="form-group">
                        <label>Etapa:</label>
                        <select id="f-etapa"></select>
                    </div>
                    <div class="form-group">
                        <label>Código-alvo:</label>
                        <input type="text" id="f-codigo" placeholder="Ex: EF15LP03">
                    </div>
                    <div class="form-group">
                        <label>Dificuldade:</label>
                        <select id="f-dificuldade">
                            <option value="Fácil">Fácil</option>
                            <option value="Média">Média</option>
                            <option value="Difícil">Difícil</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Texto-base / Suporte:</label>
                    <textarea id="f-texto-base" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Item-base / Restrições:</label>
                    <textarea id="f-item-base" rows="4"></textarea>
                </div>
                <div class="actions">
                    <button class="btn-primary" onclick="window.dispatchEvent(new CustomEvent('gerar-prompt'))">Gerar Prompt</button>
                </div>
                <div class="output-group">
                    <label>Prompt Gerado:</label>
                    <textarea id="f-prompt-result" readonly rows="8"></textarea>
                    <button class="btn-secondary" onclick="copyToClipboard('f-prompt-result')">Copiar Prompt</button>
                </div>
            </section>

            <!-- ABA 2: FORMATADOR DE ITEM -->
            <section id="tab-formatador" class="tab-content">
                <div class="form-group">
                    <label>Texto Bruto do Item:</label>
                    <textarea id="i-texto-bruto" rows="12" placeholder="Cole aqui o conteúdo gerado pela IA..."></textarea>
                </div>
                <div class="actions">
                    <button class="btn-secondary" onclick="clearField('i-texto-bruto')">Limpar</button>
                    <button class="btn-primary" onclick="window.dispatchEvent(new CustomEvent('gerar-docx'))">Gerar Documento (.docx)</button>
                </div>
                <div id="i-alertas" class="alert-container"></div>
            </section>

            <!-- ABA 3: PADRÃO SAFA -->
            <section id="tab-safa" class="tab-content">
                <div class="form-group">
                    <label>Arquivos .docx de Origem:</label>
                    <input type="text" id="s-arquivos-path" readonly placeholder="Nenhum arquivo selecionado">
                    <button class="btn-secondary" onclick="window.dispatchEvent(new CustomEvent('selecionar-arquivos'))">Selecionar Arquivos</button>
                </div>
                <div class="form-group">
                    <label>Intervalo de Itens (ex: 1, 3-5, 8):</label>
                    <input type="text" id="s-intervalo" placeholder="Todos">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="s-ensinart"> Incluir Logotipo ENSINART</label>
                </div>
                <div class="actions">
                    <button class="btn-primary" onclick="window.dispatchEvent(new CustomEvent('processar-safa'))">Processar Padrão SAFA (6 Págs)</button>
                </div>
                <div id="s-log" class="log-container"></div>
            </section>

            <!-- ABA 4: MONTAGEM DAS IMAGENS -->
            <section id="tab-imagens" class="tab-content">
                <div class="form-group">
                    <label>Selecionar Pasta ou Arquivos (.docx):</label>
                    <input type="text" id="img-path" readonly placeholder="Nenhum arquivo selecionado">
                    <button class="btn-secondary" onclick="window.dispatchEvent(new CustomEvent('selecionar-img-path'))">Selecionar</button>
                </div>
                <div class="grid-form">
                    <div class="form-group">
                        <label>DPI de Renderização:</label>
                        <input type="number" id="img-dpi" value="200">
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="img-crop"> Cortar Fundo Branco Excedente</label>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-primary" onclick="window.dispatchEvent(new CustomEvent('converter-png'))">Converter para PNG</button>
                </div>
                <div id="img-result" class="result-container"></div>
            </section>
        </main>
        
        <footer>
            <div id="status-bar">Aguardando interação...</div>
        </footer>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
